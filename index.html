<!-- PATCH PREMIUM GRID HERO + FONTE -->
<!-- Cole este bloco no seu CSS substituindo os estilos antigos -->
<style>
body{
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
  position:relative;
  isolation:isolate;
}

/* grid sutil no site inteiro */
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    linear-gradient(to right, rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size:48px 48px;
  opacity:.35;
}

/* grid premium focado no hero */
.hero::before{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.08), transparent 35%),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,.06), transparent 40%),
    linear-gradient(to right, rgba(255,255,255,.07) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.07) 1px, transparent 1px);
  background-size:100% 100%, 100% 100%, 42px 42px, 42px 42px;
  opacity:.75;
  mask-image: radial-gradient(circle at center, black 35%, transparent 100%);
  -webkit-mask-image: radial-gradient(circle at center, black 35%, transparent 100%);
}

.hero-copy,
.hero-stage{
  position:relative;
  z-index:2;
}

.hero-sub,
p,
.feature-card p,
.card p{
  font-family:'Montserrat',sans-serif;
  font-weight:400;
}
</style>
